name: Debug Dump

on:
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          pip install playwright==1.48.0 playwright-stealth==1.0.6
          playwright install --with-deps chromium

      - run: python debug_dump.py

      - name: Commit dump
        run: |
          git config user.name "debug-dump"
          git config user.email "actions@users.noreply.github.com"
          git add debug/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "debug: dump page HTML for inspection [skip ci]"
            git push
          fi
